<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland Nature Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useCallback, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = Recharts;

        /*
         * SCOTLAND NATURE DASHBOARD
         * Data sources:
         * 1. GitHub Pages — processed NatureScot open data (national.json, sites.json)
         * 2. Postcodes.io — postcode geocoding (live API)
         * 3. NBN Atlas — species occurrence records (live API)
         */

        const GITHUB_DATA_BASE = "https://danparis89-hash.github.io/scotland-nature-data/dashboard-data";
        const SCOTTISH_PREFIXES = ["AB","DD","DG","EH","FK","HS","IV","KA","KW","KY","ML","PA","PH","TD","ZE"];
        const GROUP_ICONS = {
            Birds: "🐦", Mammals: "🦊", Plants: "🌿", Insects: "🦋", Fungi: "🍄",
            Amphibians: "🐸", Reptiles: "🦎", Fish: "🐟", "Flowering Plants": "🌸",
            Ferns: "🌾", Mosses: "🪨", Molluscs: "🐌", Crustaceans: "🦀", Spiders: "🕷️",
        };
        const DESIGNATION_COLORS = {
            SSSI: "#2D6A4F", SAC: "#40916C", SPA: "#52B788", NNR: "#74C69D", Ramsar: "#95D5B2",
        };

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Failed: ${res.status}`);
            return res.json();
        }

        function haversineKm(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = ((lat2 - lat1) * Math.PI) / 180;
            const dLon = ((lon2 - lon1) * Math.PI) / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function DesignationBadge({ type }) {
            return React.createElement("span", { style: {
                display: "inline-block", padding: "2px 8px", borderRadius: "4px", fontSize: "11px",
                fontWeight: 700, letterSpacing: "0.5px", color: "#fff",
                backgroundColor: DESIGNATION_COLORS[type] || "#6B7280",
                fontFamily: "'JetBrains Mono', monospace",
            }}, type);
        }

        function StatusBanner({ status }) {
            if (!status) return React.createElement("div", { style: { padding: "12px 16px", borderRadius: "10px", backgroundColor: "#F9FAFB", border: "1px solid #E5E7EB", fontSize: "13px", color: "#6B7280", textAlign: "center" }}, "Checking data sources…");
            const problems = [];
            if (!status.github) problems.push("GitHub Pages data");
            if (!status.postcodes) problems.push("Postcodes.io");
            if (!status.nbn) problems.push("NBN Atlas");
            if (problems.length === 0) return null;
            return React.createElement("div", { style: { padding: "16px 20px", borderRadius: "12px", backgroundColor: problems.length === 3 ? "#FEF2F2" : "#FFFBEB", border: "1px solid " + (problems.length === 3 ? "#FECACA" : "#FDE68A"), fontSize: "13px", lineHeight: 1.6 }},
                React.createElement("div", { style: { fontWeight: 700, color: problems.length === 3 ? "#991B1B" : "#92400E", marginBottom: "6px" }},
                    problems.length === 3 ? "Data sources unreachable" : "Some data sources unreachable"),
                React.createElement("div", { style: { color: problems.length === 3 ? "#B91C1C" : "#A16207" }},
                    problems.length === 3 ? "This dashboard requires internet access." : "Unreachable: " + problems.join(", ")),
                React.createElement("div", { style: { display: "flex", gap: "16px", marginTop: "10px" }},
                    [["GitHub data", status.github], ["Postcodes.io", status.postcodes], ["NBN Atlas", status.nbn]].map(([name, ok]) =>
                        React.createElement("div", { key: name, style: { display: "flex", alignItems: "center", gap: "5px", fontSize: "12px" }},
                            React.createElement("span", { style: { width: 8, height: 8, borderRadius: "50%", backgroundColor: ok ? "#22C55E" : "#EF4444", display: "inline-block" }}),
                            React.createElement("span", { style: { color: "#374151" }}, name)
                        )
                    )
                )
            );
        }

        function NationalPanel({ data }) {
            if (!data) return null;
            const counts = data.designation_counts || {};
            const types = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            return React.createElement("div", { style: { backgroundColor: "#fff", borderRadius: "16px", border: "1px solid #E5E7EB", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", overflow: "hidden" }},
                React.createElement("div", { style: { padding: "16px 20px 12px", borderBottom: "1px solid #F3F4F6" }},
                    React.createElement("h2", { style: { margin: 0, fontSize: "16px", fontWeight: 700, color: "#1B4332" }}, "🏴󠁧󠁢󠁳󠁣󠁴󠁿 Protected Sites Across Scotland"),
                    React.createElement("p", { style: { margin: "2px 0 0", fontSize: "12px", color: "#9CA3AF" }},
                        "Source: NatureScot GeoJSON downloads · Processed " + (data.last_processed ? new Date(data.last_processed).toLocaleDateString() : "recently"))
                ),
                React.createElement("div", { style: { padding: "20px" }},
                    React.createElement("div", { style: { display: "flex", gap: "12px", flexWrap: "wrap", marginBottom: "16px" }},
                        types.map(([type, count]) =>
                            React.createElement("div", { key: type, style: { display: "flex", alignItems: "center", gap: "8px", padding: "10px 16px", borderRadius: "10px", backgroundColor: "#F0FFF4", border: "1px solid #D1FAE5" }},
                                React.createElement(DesignationBadge, { type }),
                                React.createElement("span", { style: { fontSize: "22px", fontWeight: 700, color: "#1B4332", fontFamily: "'JetBrains Mono', monospace" }}, count.toLocaleString())
                            )
                        )
                    ),
                    React.createElement("div", { style: { fontSize: "14px", fontWeight: 600, color: "#1B4332" }},
                        (data.total_sites || 0).toLocaleString() + " total designated sites"),
                    data.data_sources?.protected_sites &&
                        React.createElement("div", { style: { marginTop: "8px", fontSize: "11px", color: "#9CA3AF" }}, data.data_sources.protected_sites.attribution)
                )
            );
        }

        function NearbySitesPanel({ sites, lat, lon, radius, onRadiusChange }) {
            if (!sites) return null;
            const nearby = sites.filter(s => s.centroid_lat && s.centroid_lon)
                .map(s => ({ ...s, distance: haversineKm(lat, lon, s.centroid_lat, s.centroid_lon) }))
                .filter(s => s.distance <= radius).sort((a, b) => a.distance - b.distance);
            const byType = {};
            nearby.forEach(s => { byType[s.type] = (byType[s.type] || 0) + 1; });

            return React.createElement("div", { style: { backgroundColor: "#fff", borderRadius: "16px", border: "1px solid #E5E7EB", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", overflow: "hidden" }},
                React.createElement("div", { style: { padding: "16px 20px 12px", borderBottom: "1px solid #F3F4F6", display: "flex", alignItems: "center", justifyContent: "space-between" }},
                    React.createElement("div", null,
                        React.createElement("h2", { style: { margin: 0, fontSize: "16px", fontWeight: 700, color: "#1B4332" }}, "📍 Protected Sites Nearby"),
                        React.createElement("p", { style: { margin: "2px 0 0", fontSize: "12px", color: "#9CA3AF" }},
                            nearby.length + " site" + (nearby.length !== 1 ? "s" : "") + " within " + radius + "km · Source: NatureScot open data")
                    ),
                    React.createElement("select", { value: radius, onChange: (e) => onRadiusChange(Number(e.target.value)),
                        style: { padding: "4px 8px", borderRadius: "6px", border: "1px solid #D1D5DB", fontSize: "12px", color: "#374151", cursor: "pointer" }},
                        [2,5,10,20].map(v => React.createElement("option", { key: v, value: v }, v + " km"))
                    )
                ),
                React.createElement("div", { style: { padding: "16px 20px" }},
                    nearby.length === 0
                        ? React.createElement("div", { style: { padding: "20px", textAlign: "center", color: "#6B7280", fontStyle: "italic" }},
                            "No designated sites found within " + radius + "km. Try expanding the search radius.")
                        : React.createElement(React.Fragment, null,
                            React.createElement("div", { style: { display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "12px" }},
                                Object.entries(byType).map(([type, count]) =>
                                    React.createElement("div", { key: type, style: { display: "flex", alignItems: "center", gap: "5px", padding: "3px 8px", borderRadius: "16px", backgroundColor: "#F0FFF4", border: "1px solid #D1FAE5", fontSize: "12px" }},
                                        React.createElement(DesignationBadge, { type }),
                                        React.createElement("span", { style: { fontWeight: 600, color: "#1B4332" }}, count)
                                    )
                                )
                            ),
                            React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "6px" }},
                                nearby.slice(0, 25).map((site, i) =>
                                    React.createElement("div", { key: site.name + "-" + site.type + "-" + i, style: {
                                        display: "flex", alignItems: "center", justifyContent: "space-between",
                                        padding: "10px 14px", borderRadius: "8px",
                                        backgroundColor: i % 2 === 0 ? "#FAFDF7" : "#fff", border: "1px solid #E5E7EB",
                                    }},
                                        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "10px", flex: 1, minWidth: 0 }},
                                            React.createElement(DesignationBadge, { type: site.type }),
                                            React.createElement("div", { style: { minWidth: 0 }},
                                                React.createElement("div", { style: { fontWeight: 600, color: "#1B4332", fontSize: "13px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}, site.name),
                                                site.area_ha && React.createElement("div", { style: { fontSize: "11px", color: "#9CA3AF" }}, site.area_ha.toLocaleString() + " ha")
                                            )
                                        ),
                                        React.createElement("div", { style: { fontSize: "13px", fontWeight: 600, color: "#40916C", whiteSpace: "nowrap", fontFamily: "'JetBrains Mono', monospace" }},
                                            site.distance.toFixed(1) + " km")
                                    )
                                ),
                                nearby.length > 25 && React.createElement("div", { style: { textAlign: "center", fontSize: "12px", color: "#9CA3AF", padding: "8px" }},
                                    "…and " + (nearby.length - 25) + " more")
                            )
                        )
                )
            );
        }

        function SpeciesPanel({ groups, onSelectGroup, selectedGroup, speciesList, loadingSpecies }) {
            const chartData = groups.slice(0, 12).map(g => ({
                name: g.name.length > 14 ? g.name.slice(0, 13) + "…" : g.name,
                fullName: g.name, species: g.speciesCount || g.count, records: g.count,
            }));
            const totalSpecies = groups.reduce((s, g) => s + (g.speciesCount || 0), 0);
            const totalRecords = groups.reduce((s, g) => s + g.count, 0);

            return React.createElement("div", null,
                React.createElement("div", { style: { display: "flex", gap: "16px", marginBottom: "20px", flexWrap: "wrap" }},
                    [
                        { label: "Species recorded", value: totalSpecies.toLocaleString(), bg: "linear-gradient(135deg, #1B4332, #2D6A4F)", color: "#fff" },
                        { label: "Total records", value: totalRecords.toLocaleString(), bg: "linear-gradient(135deg, #40916C, #52B788)", color: "#fff" },
                        { label: "Taxonomic groups", value: groups.length, bg: "linear-gradient(135deg, #74C69D, #95D5B2)", color: "#1B4332" },
                    ].map((s, i) => React.createElement("div", { key: i, style: { padding: "12px 20px", borderRadius: "12px", background: s.bg, color: s.color, flex: 1, minWidth: 140 }},
                        React.createElement("div", { style: { fontSize: "28px", fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}, s.value),
                        React.createElement("div", { style: { fontSize: "12px", opacity: 0.8, marginTop: 2 }}, s.label)
                    ))
                ),
                React.createElement("div", { style: { width: "100%", height: Math.max(280, chartData.length * 32) }},
                    React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
                        React.createElement(BarChart, { data: chartData, layout: "vertical", margin: { left: 10, right: 30, top: 5, bottom: 5 }},
                            React.createElement(XAxis, { type: "number", tick: { fontSize: 12, fill: "#6B7280" }, axisLine: false, tickLine: false }),
                            React.createElement(YAxis, { type: "category", dataKey: "name", width: 120, tick: { fontSize: 12, fill: "#374151" }, axisLine: false, tickLine: false }),
                            React.createElement(Tooltip, { content: ({ active, payload }) => {
                                if (!active || !payload?.[0]) return null;
                                const d = payload[0].payload;
                                return React.createElement("div", { style: { background: "#fff", border: "1px solid #E5E7EB", borderRadius: "8px", padding: "10px 14px", boxShadow: "0 4px 12px rgba(0,0,0,0.1)", fontSize: "13px" }},
                                    React.createElement("div", { style: { fontWeight: 700, color: "#1B4332" }}, (GROUP_ICONS[d.fullName] || "📋") + " " + d.fullName),
                                    React.createElement("div", { style: { color: "#6B7280", marginTop: 4 }}, d.species + " species · " + d.records.toLocaleString() + " records")
                                );
                            }}),
                            React.createElement(Bar, { dataKey: "species", radius: [0, 6, 6, 0], cursor: "pointer", onClick: (d) => onSelectGroup(d.fullName) },
                                chartData.map((d, i) => React.createElement(Cell, { key: i, fill: d.fullName === selectedGroup ? "#1B4332" : "#52B788" }))
                            )
                        )
                    )
                ),
                React.createElement("div", { style: { fontSize: "12px", color: "#9CA3AF", textAlign: "center", marginTop: 4 }}, "Click a bar to view species list"),
                selectedGroup && React.createElement("div", { style: { marginTop: "20px", border: "1px solid #D1FAE5", borderRadius: "12px", overflow: "hidden", backgroundColor: "#FAFDF7" }},
                    React.createElement("div", { style: { padding: "12px 16px", backgroundColor: "#D8F3DC", display: "flex", alignItems: "center", justifyContent: "space-between" }},
                        React.createElement("span", { style: { fontWeight: 700, color: "#1B4332", fontSize: "14px" }}, (GROUP_ICONS[selectedGroup] || "📋") + " " + selectedGroup),
                        React.createElement("button", { onClick: () => onSelectGroup(null), style: { background: "none", border: "none", cursor: "pointer", fontSize: "18px", color: "#6B7280" }}, "✕")
                    ),
                    loadingSpecies
                        ? React.createElement("div", { style: { padding: "24px", textAlign: "center", color: "#6B7280" }}, "Loading species…")
                        : speciesList && speciesList.length > 0
                            ? React.createElement("div", { style: { maxHeight: 320, overflowY: "auto" }},
                                speciesList.map((sp, i) => React.createElement("div", { key: i, style: {
                                    display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px",
                                    borderBottom: i < speciesList.length - 1 ? "1px solid #E5E7EB" : "none",
                                    backgroundColor: i % 2 === 0 ? "#fff" : "#FAFDF7",
                                }},
                                    React.createElement("div", null,
                                        React.createElement("div", { style: { fontWeight: 600, color: "#1B4332", fontSize: "13px" }}, sp.name),
                                        React.createElement("div", { style: { fontSize: "11px", color: "#9CA3AF", fontStyle: "italic" }}, sp.scientificName)
                                    ),
                                    React.createElement("div", { style: { fontFamily: "'JetBrains Mono', monospace", fontSize: "13px", fontWeight: 600, color: "#40916C" }}, sp.count)
                                ))
                            )
                            : React.createElement("div", { style: { padding: "24px", textAlign: "center", color: "#6B7280" }}, "No species data available.")
                )
            );
        }

        function App() {
            const [apiStatus, setApiStatus] = useState(null);
            const [nationalData, setNationalData] = useState(null);
            const [allSites, setAllSites] = useState(null);
            const [postcode, setPostcode] = useState("");
            const [location, setLocation] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [speciesGroups, setSpeciesGroups] = useState(null);
            const [selectedGroup, setSelectedGroup] = useState(null);
            const [speciesList, setSpeciesList] = useState(null);
            const [loadingSpecies, setLoadingSpecies] = useState(false);
            const [speciesLoading, setSpeciesLoading] = useState(false);
            const [speciesError, setSpeciesError] = useState(null);
            const [radius, setRadius] = useState(5);

            useEffect(() => {
                (async () => {
                    const status = { github: false, postcodes: false, nbn: false };
                    try { setNationalData(await fetchJSON(GITHUB_DATA_BASE + "/national.json")); status.github = true; } catch {}
                    try { setAllSites(await fetchJSON(GITHUB_DATA_BASE + "/sites.json")); if (!status.github) status.github = true; } catch {}
                    try { const r = await fetch("https://api.postcodes.io/postcodes/EH11RE", { signal: AbortSignal.timeout(5000) }); status.postcodes = r.ok; } catch {}
                    try { const r = await fetch("https://records-ws.nbnatlas.org/explore/groups?lat=55.95&lon=-3.19&radius=1", { signal: AbortSignal.timeout(5000) }); status.nbn = r.ok; } catch {}
                    setApiStatus(status);
                })();
            }, []);

            const handleSearch = useCallback(async () => {
                const clean = postcode.replace(/\s/g, "").toUpperCase();
                if (clean.length < 5) { setError("Please enter a full Scottish postcode (e.g. EH1 1RE)"); return; }
                if (!SCOTTISH_PREFIXES.includes(clean.slice(0, 2)) && !/^G\d/.test(clean)) { setError("This doesn't look like a Scottish postcode."); return; }
                setError(null); setLoading(true); setSpeciesGroups(null); setSelectedGroup(null); setSpeciesList(null); setSpeciesError(null);
                try {
                    const res = await fetch("https://api.postcodes.io/postcodes/" + clean);
                    if (!res.ok) throw new Error("Invalid postcode");
                    const data = await res.json();
                    if (data.result.country !== "Scotland") throw new Error("Not in Scotland");
                    const loc = { lat: data.result.latitude, lon: data.result.longitude, admin: data.result.admin_district, constituency: data.result.parliamentary_constituency, postcode: data.result.postcode };
                    setLocation(loc); setLoading(false);
                    setSpeciesLoading(true);
                    try {
                        const r = await fetch("https://records-ws.nbnatlas.org/explore/groups?lat=" + loc.lat + "&lon=" + loc.lon + "&radius=" + radius + "&fq=country:Scotland");
                        if (!r.ok) throw new Error();
                        setSpeciesGroups((await r.json()).filter(g => g.count > 0).map(g => ({ name: g.name, count: g.count, speciesCount: g.speciesCount })).sort((a, b) => b.count - a.count));
                    } catch { setSpeciesError("Could not load species data from the NBN Atlas."); }
                    finally { setSpeciesLoading(false); }
                } catch (e) { setLoading(false); setError(e.message === "Not in Scotland" ? "This postcode isn't in Scotland." : e.message === "Invalid postcode" ? "Postcode not recognised." : "Could not look up postcode. Check your internet connection."); }
            }, [postcode, radius]);

            const handleGroupSelect = useCallback(async (groupName) => {
                if (groupName === selectedGroup) { setSelectedGroup(null); setSpeciesList(null); return; }
                setSelectedGroup(groupName); setLoadingSpecies(true);
                try {
                    const r = await fetch("https://records-ws.nbnatlas.org/explore/group/" + encodeURIComponent(groupName) + "?lat=" + location.lat + "&lon=" + location.lon + "&radius=" + radius + "&pageSize=20&fq=country:Scotland");
                    if (!r.ok) throw new Error();
                    setSpeciesList((await r.json()).map(s => ({ name: s.commonName || s.name, scientificName: s.name, count: s.count })));
                } catch { setSpeciesList([]); }
                setLoadingSpecies(false);
            }, [location, selectedGroup, radius]);

            const canSearch = apiStatus?.postcodes;

            return React.createElement("div", { style: { minHeight: "100vh", background: "linear-gradient(170deg, #F0FFF4 0%, #ECFDF5 30%, #F9FAFB 100%)", fontFamily: "'Instrument Sans', 'Segoe UI', system-ui, sans-serif" }},

                // Header
                React.createElement("div", { style: { background: "linear-gradient(135deg, #1B4332 0%, #2D6A4F 60%, #40916C 100%)", padding: "32px 24px 28px", color: "#fff" }},
                    React.createElement("div", { style: { maxWidth: 900, margin: "0 auto" }},
                        React.createElement("h1", { style: { margin: "0 0 6px", fontSize: "26px", fontWeight: 700, letterSpacing: "-0.5px" }}, "Scotland Nature Dashboard"),
                        React.createElement("p", { style: { margin: 0, fontSize: "14px", opacity: 0.8 }}, "Explore biodiversity and protected sites near any Scottish postcode"),
                        canSearch && React.createElement("div", { style: { display: "flex", gap: "10px", marginTop: "20px", maxWidth: 480 }},
                            React.createElement("input", { type: "text", value: postcode, onChange: (e) => setPostcode(e.target.value.toUpperCase()),
                                onKeyDown: (e) => e.key === "Enter" && handleSearch(), placeholder: "e.g. EH1 1RE",
                                style: { flex: 1, padding: "12px 16px", borderRadius: "10px", border: "2px solid rgba(255,255,255,0.25)", backgroundColor: "rgba(255,255,255,0.12)", color: "#fff", fontSize: "16px", fontWeight: 600, letterSpacing: "1px", fontFamily: "'JetBrains Mono', monospace" }}),
                            React.createElement("button", { onClick: handleSearch, disabled: loading,
                                style: { padding: "12px 24px", borderRadius: "10px", border: "none", backgroundColor: "#D8F3DC", color: "#1B4332", fontWeight: 700, fontSize: "14px", cursor: loading ? "wait" : "pointer", whiteSpace: "nowrap" }},
                                loading ? "Searching…" : "Explore")
                        ),
                        error && React.createElement("div", { style: { marginTop: "12px", padding: "8px 14px", borderRadius: "8px", backgroundColor: "rgba(239,68,68,0.15)", color: "#FCA5A5", fontSize: "13px", maxWidth: 480 }}, error),
                        location && React.createElement("div", { className: "fade-in", style: { marginTop: "12px", fontSize: "13px", opacity: 0.85, display: "flex", alignItems: "center", gap: "6px" }},
                            "📍 ", React.createElement("strong", null, location.postcode), " · ", location.admin, location.constituency ? " · " + location.constituency : "")
                    )
                ),

                // Content
                React.createElement("div", { style: { maxWidth: 900, margin: "0 auto", padding: "24px", display: "flex", flexDirection: "column", gap: "20px" }},
                    React.createElement(StatusBanner, { status: apiStatus }),
                    nationalData && !location && React.createElement(NationalPanel, { data: nationalData }),

                    location && React.createElement(React.Fragment, null,
                        allSites && React.createElement(NearbySitesPanel, { sites: allSites, lat: location.lat, lon: location.lon, radius, onRadiusChange: setRadius }),
