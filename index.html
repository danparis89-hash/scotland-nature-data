<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland Nature Dashboard</title>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-is@18.3.1/umd/react-is.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Instrument Sans', 'Segoe UI', system-ui, sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        input:focus { outline: none; border-color: #40916C !important; box-shadow: 0 0 0 3px rgba(64,145,108,0.15) !important; }
        button:hover { opacity: 0.88; }
    </style>
    <!-- regional data pre-loaded as a script so it works from file:// and any HTTP server -->
    <script src="dashboard-data/regional.js" onerror="window.__regionalData=null"></script>
</head>
<body>
    <div id="root"><div style="padding:40px;font-family:sans-serif;color:#555">Loading Scotland Nature Dashboard…</div></div>
    <script>
    window.addEventListener("load", function() {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Recharts === "undefined") {
            document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c00"><b>Error:</b> A required script failed to load. Check your internet connection and try again.</div>';
            return;
        }
        try {

        var e = React.createElement;
        var useState = React.useState;
        var useEffect = React.useEffect;
        var BarChart = Recharts.BarChart;
        var Bar = Recharts.Bar;
        var XAxis = Recharts.XAxis;
        var YAxis = Recharts.YAxis;
        var Tooltip = Recharts.Tooltip;
        var ResponsiveContainer = Recharts.ResponsiveContainer;
        var Cell = Recharts.Cell;

        // On GitHub Pages use the canonical URL; everywhere else (local dev server,
        // local file open, etc.) use a relative path so locally-generated
        // dashboard-data files are picked up directly – no need to deploy first.
        var GITHUB_DATA = location.hostname.endsWith("github.io")
            ? "https://danparis89-hash.github.io/scotland-nature-data/dashboard-data"
            : "dashboard-data";
        var SCOT_PREFIX = ["AB","DD","DG","EH","FK","HS","IV","KA","KW","KY","ML","PA","PH","TD","ZE"];
        var DESIG_COL = { SSSI:"#2D6A4F", SAC:"#40916C", SPA:"#52B788", NNR:"#74C69D", Ramsar:"#95D5B2" };
        var ICONS = {
            Birds:"🐦", Mammals:"🦊", Plants:"🌿", Insects:"🦋", Fungi:"🍄",
            Amphibians:"🐸", Reptiles:"🦎", Fish:"🐟", "Flowering Plants":"🌸",
            Ferns:"🌾", Mosses:"🪨", Molluscs:"🐌", Crustaceans:"🦀", Spiders:"🕷️"
        };
        var TABS = [
            {id:"national", label:"National", icon:"🏴󠁧󠁢󠁳󠁣󠁴󠁿"},
            {id:"regional", label:"Regional", icon:"🗺️"},
            {id:"postcode", label:"Postcode", icon:"📮"}
        ];

        // ── Helpers ──────────────────────────────────────────────────────────

        // Fetch with a timeout (default 10s) to avoid hanging on unreachable APIs
        function fetchWithTimeout(url, ms){
            ms = ms || 10000;
            var controller = new AbortController();
            var id = setTimeout(function(){ controller.abort(); }, ms);
            return fetch(url, {signal: controller.signal}).then(function(r){
                clearTimeout(id); return r;
            }).catch(function(err){ clearTimeout(id); throw err; });
        }

        function haversine(lat1,lon1,lat2,lon2){
            var R=6371,dLat=((lat2-lat1)*Math.PI)/180,dLon=((lon2-lon1)*Math.PI)/180;
            var a=Math.sin(dLat/2)**2+Math.cos((lat1*Math.PI)/180)*Math.cos((lat2*Math.PI)/180)*Math.sin(dLon/2)**2;
            return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        }

        // Approximate circular radius from area so we can measure distance to
        // boundary rather than centroid (important for large estuarine sites).
        function siteApproxRadiusKm(area_ha){
            if(!area_ha||area_ha<=0)return 0;
            return Math.sqrt((area_ha*10000)/Math.PI)/1000;
        }

        // ── Shared components ─────────────────────────────────────────────────

        function Badge(p){
            return e("span",{style:{display:"inline-block",padding:"2px 8px",borderRadius:"4px",fontSize:"11px",fontWeight:700,letterSpacing:"0.5px",color:"#fff",backgroundColor:DESIG_COL[p.type]||"#6B7280",fontFamily:"'JetBrains Mono',monospace"}},p.type);
        }

        function StatusBanner(p){
            var status=p.status;
            if(!status) return e("div",{style:{padding:"12px 16px",borderRadius:"10px",backgroundColor:"#F9FAFB",border:"1px solid #E5E7EB",fontSize:"13px",color:"#6B7280",textAlign:"center"}},"Checking data sources…");
            var probs=[];
            if(!status.github)probs.push("GitHub Pages data");
            if(!status.postcodes)probs.push("Postcodes.io");
            if(probs.length===0)return null;
            var allDown=probs.length===2;
            return e("div",{style:{padding:"16px 20px",borderRadius:"12px",backgroundColor:allDown?"#FEF2F2":"#FFFBEB",border:"1px solid "+(allDown?"#FECACA":"#FDE68A"),fontSize:"13px",lineHeight:1.6}},
                e("div",{style:{fontWeight:700,color:allDown?"#991B1B":"#92400E",marginBottom:"6px"}},allDown?"Data sources unreachable":"Some data sources unreachable"),
                e("div",{style:{color:allDown?"#B91C1C":"#A16207"}},allDown?"This dashboard requires internet access.":"Unreachable: "+probs.join(", ")),
                e("div",{style:{display:"flex",gap:"16px",marginTop:"10px"}},
                    [["GitHub data",status.github],["Postcodes.io",status.postcodes]].map(function(x){
                        return e("div",{key:x[0],style:{display:"flex",alignItems:"center",gap:"5px",fontSize:"12px"}},
                            e("span",{style:{width:8,height:8,borderRadius:"50%",backgroundColor:x[1]?"#22C55E":"#EF4444",display:"inline-block"}}),
                            e("span",{style:{color:"#374151"}},x[0]));
                    })
                )
            );
        }

        // ── National page ─────────────────────────────────────────────────────

        function NationalPage(p){
            var data=p.data;
            if(!data) return e("div",{style:{padding:"48px",textAlign:"center",color:"#6B7280"}},"Loading national data…");
            var counts=data.designation_counts||{};
            var _sel=useState(null), selected=_sel[0], setSelected=_sel[1];
            var PROTECTED=["SSSI","SAC","SPA","Ramsar"];
            var OTHER=["NNR"];
            function DesigCard(cp){
                var type=cp.type, count=counts[type]||0;
                var isSel=selected===type;
                return e("div",{onClick:function(){setSelected(isSel?null:type);},style:{
                    padding:"16px 20px",borderRadius:"14px",textAlign:"center",cursor:"pointer",
                    background:isSel?"linear-gradient(135deg,#1B4332,#2D6A4F)":"linear-gradient(135deg,#F0FFF4,#D8F3DC)",
                    border:"1px solid "+(isSel?"#1B4332":"#D1FAE5"),
                    transition:"box-shadow 0.15s",
                    boxShadow:isSel?"0 2px 8px rgba(27,67,50,0.25)":"none"
                }},
                    e(Badge,{type:type,dark:isSel}),
                    e("div",{style:{fontSize:"30px",fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginTop:"8px",color:isSel?"#fff":"#1B4332"}},count.toLocaleString()),
                    e("div",{style:{fontSize:"11px",marginTop:"2px",color:isSel?"rgba(255,255,255,0.75)":"#6B7280"}},"designated sites")
                );
            }
            function CategoryBlock(cp){
                var label=cp.label, types=cp.types;
                return e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",padding:"16px 20px"}},
                    e("div",{style:{fontSize:"11px",fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:"12px"}},label),
                    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"10px"}},
                        types.map(function(t){return e(DesigCard,{key:t,type:t});})
                    )
                );
            }
            var aboutContent=selected
                ? e("div",{style:{color:"#9CA3AF",fontSize:"13px",fontStyle:"italic"}},selected+" — coming soon")
                : e("div",{style:{color:"#9CA3AF",fontSize:"13px"}},
                    "Select a designation to find out more");
            var CURRENT_PCT=18.2, TARGET_PCT=30;
            var fillPct=parseFloat((CURRENT_PCT/TARGET_PCT*100).toFixed(1));
            var gap=parseFloat((TARGET_PCT-CURRENT_PCT).toFixed(1));
            return e("div",{style:{display:"flex",flexDirection:"column",gap:"16px"}},
                e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}},
                    e(CategoryBlock,{label:"Protected sites",types:PROTECTED}),
                    e(CategoryBlock,{label:"Other designations",types:OTHER})
                ),
                e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",padding:"20px 24px",minHeight:"80px",display:"flex",alignItems:"center"}},
                    aboutContent
                ),
                e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",overflow:"hidden"}},
                    e("div",{style:{padding:"14px 20px",borderBottom:"1px solid #F3F4F6",display:"flex",alignItems:"center",gap:"10px"}},
                        e("div",{style:{padding:"3px 9px",borderRadius:"5px",backgroundColor:"#1B4332",color:"#fff",fontSize:"12px",fontWeight:700,letterSpacing:"0.5px"}},"30×30"),
                        e("div",{style:{fontSize:"12px",color:"#6B7280"}},"Scotland's land protected for nature")
                    ),
                    e("div",{style:{padding:"20px 24px"}},
                        e("div",{style:{position:"relative"}},
                            e("div",{style:{height:"32px",borderRadius:"8px",backgroundColor:"#E5E7EB",overflow:"hidden",position:"relative"}},
                                e("div",{style:{position:"absolute",top:0,left:0,bottom:0,width:"18.2%",background:"linear-gradient(90deg,#1B4332 0%,#2D6A4F 100%)"}}),
                                e("div",{style:{position:"absolute",top:0,left:"18.2%",bottom:0,width:"11.8%",backgroundColor:"#95D5B2"}})
                            ),
                            e("div",{style:{position:"absolute",top:"-4px",left:"30%",height:"40px",width:"2px",backgroundColor:"#40916C",transform:"translateX(-1px)"}})
                        ),
                        e("div",{style:{position:"relative",height:"20px",marginTop:"6px"}},
                            e("span",{style:{position:"absolute",left:"0",fontSize:"10px",color:"#9CA3AF"}},"0%"),
                            e("span",{style:{position:"absolute",left:"30%",fontSize:"10px",color:"#40916C",fontWeight:600,transform:"translateX(-50%)"}},"30% target"),
                            e("span",{style:{position:"absolute",right:"0",fontSize:"10px",color:"#9CA3AF"}},"100%")
                        ),
                        e("div",{style:{display:"flex",flexWrap:"wrap",gap:"16px",marginTop:"16px"}},
                            e("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
                                e("div",{style:{width:"14px",height:"14px",borderRadius:"3px",background:"linear-gradient(90deg,#1B4332,#2D6A4F)",flexShrink:0}}),
                                e("span",{style:{fontSize:"12px",color:"#374151",fontWeight:500}},"18.2% currently protected")
                            ),
                            e("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
                                e("div",{style:{width:"14px",height:"14px",borderRadius:"3px",backgroundColor:"#95D5B2",flexShrink:0}}),
                                e("span",{style:{fontSize:"12px",color:"#374151",fontWeight:500}},"11.8% to complete 30×30 target")
                            )
                        )
                    )
                ),
                e("div",{style:{padding:"12px 16px",borderRadius:"10px",backgroundColor:"#F9FAFB",border:"1px solid #E5E7EB",fontSize:"11px",color:"#9CA3AF"}},
                    "Source: NatureScot GeoJSON downloads · Processed "+(data.last_processed?new Date(data.last_processed).toLocaleDateString():"recently")+(data.data_sources&&data.data_sources.protected_sites?" · "+data.data_sources.protected_sites.attribution:"")
                )
            );
        }

        // ── Regional page ─────────────────────────────────────────────────────

        function RegionalPage(p){
            var data=p.data, error=p.error;
            var _s=useState("alpha"), sortBy=_s[0], setSortBy=_s[1];
            var _sel=useState(null), selected=_sel[0], setSelected=_sel[1];
            if(error) return e("div",{style:{padding:"48px",textAlign:"center",color:"#DC2626",fontSize:"13px"}},"Regional data could not be loaded. Please regenerate the data files and ensure regional.json is deployed.");
            // Normalise: accept plain array OR wrapped {regions:[...]} object
            var rawRows=Array.isArray(data)?data:(data&&Array.isArray(data.regions)?data.regions:null);
            if(!rawRows) return e("div",{style:{padding:"48px",textAlign:"center",color:"#6B7280"}},"Loading regional data…");
            // Normalise region objects: accept both by_type and designation_counts field names
            var norm=rawRows.map(function(r){return{
                local_authority:r.local_authority,
                total_sites:r.total_sites||0,
                total_area_ha:r.total_area_ha||null,
                by_type:r.by_type||r.designation_counts||{},
                largest_sites:r.largest_sites||[]
            };});
            var hasArea=norm.some(function(r){return r.total_area_ha;});
            var regions=[].concat(norm).sort(function(a,b){
                if(sortBy==="alpha")return a.local_authority.localeCompare(b.local_authority);
                return b.total_sites-a.total_sites;
            });
            var maxVal=Math.max.apply(null,regions.map(function(r){return r.total_sites;}));
            var selectedRegion=selected?norm.find(function(r){return r.local_authority===selected;}):null;
            return e("div",{style:{display:"flex",flexDirection:"column",gap:"20px"}},
                e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px",flexWrap:"wrap"}},
                    e("div",{style:{fontSize:"13px",fontWeight:600,color:"#1B4332"}},
                        "Nature site designations by local authority"
                    ),
                    e("div",{style:{display:"flex",gap:"6px"}},
                        [["alpha","A–Z"],["sites","By site count"]].map(function(v){
                            return e("button",{key:v[0],onClick:function(){setSortBy(v[0]);},style:{
                                padding:"5px 12px",borderRadius:"6px",border:"1px solid",
                                borderColor:sortBy===v[0]?"#40916C":"#D1D5DB",
                                backgroundColor:sortBy===v[0]?"#F0FFF4":"#fff",
                                color:sortBy===v[0]?"#1B4332":"#6B7280",
                                fontWeight:sortBy===v[0]?700:400,
                                fontSize:"12px",cursor:"pointer"
                            }},v[1]);
                        })
                    )
                ),
                e("div",{style:{display:"grid",gridTemplateColumns:selected?"1fr 340px":"1fr",gap:"16px",alignItems:"start"}},
                    e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",overflow:"hidden"}},
                        regions.map(function(r,i){
                            var pct=maxVal>0?(r.total_sites/maxVal)*100:0;
                            var isSel=r.local_authority===selected;
                            return e("div",{key:r.local_authority,
                                onClick:function(){setSelected(isSel?null:r.local_authority);},
                                style:{display:"flex",alignItems:"center",gap:"12px",padding:"10px 16px",
                                    borderBottom:i<regions.length-1?"1px solid #F3F4F6":"none",
                                    backgroundColor:isSel?"#F0FFF4":i%2===0?"#FAFDF7":"#fff",cursor:"pointer"}},
                                sortBy!=="alpha"&&e("div",{style:{width:24,fontSize:"11px",color:"#9CA3AF",textAlign:"right",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},i+1),
                                e("div",{style:{flex:1,minWidth:0}},
                                    e("div",{style:{fontWeight:600,fontSize:"13px",color:isSel?"#1B4332":"#374151",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},r.local_authority),
                                    e("div",{style:{display:"flex",gap:"4px",marginTop:"3px",flexWrap:"wrap"}},
                                        Object.entries(r.by_type).sort(function(a,b){return b[1]-a[1];}).map(function(t){
                                            return e("span",{key:t[0],style:{fontSize:"10px",color:"#6B7280"}},
                                                e("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",backgroundColor:DESIG_COL[t[0]]||"#6B7280",marginRight:2,verticalAlign:"middle"}}),
                                                t[0]+" "+t[1]);
                                        })
                                    )
                                ),
                                e("div",{style:{width:120,flexShrink:0}},
                                    e("div",{style:{height:6,borderRadius:3,backgroundColor:"#F3F4F6",overflow:"hidden"}},
                                        e("div",{style:{height:"100%",width:pct+"%",borderRadius:3,backgroundColor:isSel?"#1B4332":"#52B788"}})
                                    )
                                ),
                                e("div",{style:{width:72,textAlign:"right",fontSize:"13px",fontWeight:700,color:isSel?"#1B4332":"#40916C",fontFamily:"'JetBrains Mono',monospace",flexShrink:0}},
                                    r.total_sites.toLocaleString()
                                )
                            );
                        })
                    ),
                    selectedRegion&&e("div",{className:"fade-in",style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #D1FAE5",overflow:"hidden",position:"sticky",top:16}},
                        e("div",{style:{padding:"14px 16px",backgroundColor:"#1B4332",display:"flex",alignItems:"center",justifyContent:"space-between"}},
                            e("div",{style:{fontWeight:700,color:"#fff",fontSize:"14px"}},selectedRegion.local_authority),
                            e("button",{onClick:function(){setSelected(null);},style:{background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"rgba(255,255,255,0.7)"}},"✕")
                        ),
                        e("div",{style:{padding:"16px"}},
                            e("div",{style:{marginBottom:"14px"}},
                                e("div",{style:{padding:"10px 12px",borderRadius:"10px",backgroundColor:"#F0FFF4",border:"1px solid #D1FAE5",textAlign:"center"}},
                                    e("div",{style:{fontSize:"22px",fontWeight:700,color:"#1B4332",fontFamily:"'JetBrains Mono',monospace"}},selectedRegion.total_sites),
                                    e("div",{style:{fontSize:"11px",color:"#6B7280"}},"designations")
                                )
                            ),
                            e("div",{style:{marginBottom:"14px"}},
                                e("div",{style:{fontSize:"11px",fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},"By designation"),
                                e("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px"}},
                                    Object.entries(selectedRegion.by_type).sort(function(a,b){return b[1]-a[1];}).map(function(t){
                                        return e("div",{key:t[0],style:{display:"flex",alignItems:"center",gap:"5px",padding:"3px 8px",borderRadius:"16px",backgroundColor:"#F9FAFB",border:"1px solid #E5E7EB"}},
                                            e(Badge,{type:t[0]}),
                                            e("span",{style:{fontSize:"12px",fontWeight:600,color:"#374151"}},t[1]));
                                    })
                                )
                            ),
                            selectedRegion.largest_sites.length>0&&e("div",null,
                                e("div",{style:{fontSize:"11px",fontWeight:700,color:"#6B7280",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},"Largest sites"),
                                e("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}},
                                    selectedRegion.largest_sites.map(function(s,i){
                                        return e("div",{key:i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderRadius:"7px",backgroundColor:i%2===0?"#FAFDF7":"#fff",border:"1px solid #F3F4F6"}},
                                            e("div",{style:{display:"flex",alignItems:"center",gap:"7px",minWidth:0}},
                                                e(Badge,{type:s.type}),
                                                e("span",{style:{fontSize:"12px",color:"#1B4332",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},s.name)
                                            ),
                                            s.area_ha&&e("span",{style:{fontSize:"11px",color:"#9CA3AF",fontFamily:"'JetBrains Mono',monospace",whiteSpace:"nowrap",marginLeft:"6px"}},
                                                (s.area_ha>=1000?(s.area_ha/1000).toFixed(0)+"k":s.area_ha.toLocaleString())+" ha"
                                            )
                                        );
                                    })
                                )
                            )
                        )
                    )
                ),
                e("div",{style:{fontSize:"11px",color:"#9CA3AF",lineHeight:1.5}},"Source: NatureScot open data (OGL v3.0).")
            );
        }

        // ── Postcode page ─────────────────────────────────────────────────────

        function NearbySitesPanel(p){
            var sites=p.sites,lat=p.lat,lon=p.lon,radius=p.radius,onRadiusChange=p.onRadiusChange;
            // Deduplicate by name+type: large sites like Firth of Forth are stored as
            // hundreds of separate polygon features; keep only the closest polygon boundary.
            var seen={};
            var nearby=sites
                .filter(function(s){return s.centroid_lat&&s.centroid_lon;})
                .map(function(s){
                    var cd=haversine(lat,lon,s.centroid_lat,s.centroid_lon);
                    var bd=Math.max(0,cd-siteApproxRadiusKm(s.area_ha));
                    return Object.assign({},s,{distance:bd});
                })
                .filter(function(s){return s.distance<=radius;})
                .sort(function(a,b){return a.distance-b.distance;})
                .filter(function(s){
                    var key=s.name+"|"+s.type;
                    if(seen[key])return false;
                    seen[key]=true;
                    return true;
                });
            var byType={};
            nearby.forEach(function(s){byType[s.type]=(byType[s.type]||0)+1;});
            return e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",overflow:"hidden"}},
                e("div",{style:{padding:"16px 20px 12px",borderBottom:"1px solid #F3F4F6",display:"flex",alignItems:"center",justifyContent:"space-between"}},
                    e("div",null,
                        e("h2",{style:{margin:0,fontSize:"16px",fontWeight:700,color:"#1B4332"}},"📍 Protected Sites Nearby"),
                        e("p",{style:{margin:"2px 0 0",fontSize:"12px",color:"#9CA3AF"}},
                            nearby.length+" site"+(nearby.length!==1?"s":"")+" within "+radius+"km · distances to nearest boundary · Source: NatureScot open data")
                    ),
                    e("select",{value:radius,onChange:function(ev){onRadiusChange(Number(ev.target.value));},style:{padding:"4px 8px",borderRadius:"6px",border:"1px solid #D1D5DB",fontSize:"12px",color:"#374151",cursor:"pointer"}},
                        [2,5,10,20].map(function(v){return e("option",{key:v,value:v},v+" km");}))
                ),
                e("div",{style:{padding:"16px 20px"}},
                    nearby.length===0
                        ?e("div",{style:{padding:"20px",textAlign:"center",color:"#6B7280",fontStyle:"italic"}},"No designated sites found within "+radius+"km. Try expanding the search radius.")
                        :e(React.Fragment,null,
                            e("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}},
                                Object.keys(byType).map(function(t){
                                    return e("div",{key:t,style:{display:"flex",alignItems:"center",gap:"5px",padding:"3px 8px",borderRadius:"16px",backgroundColor:"#F0FFF4",border:"1px solid #D1FAE5",fontSize:"12px"}},
                                        e(Badge,{type:t}),
                                        e("span",{style:{fontWeight:600,color:"#1B4332"}},byType[t]));
                                })
                            ),
                            e("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}},
                                nearby.slice(0,20).map(function(s,i){
                                    return e("div",{key:s.name+"-"+s.type+"-"+i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:"8px",backgroundColor:i%2===0?"#FAFDF7":"#fff",border:"1px solid #E5E7EB"}},
                                        e("div",{style:{display:"flex",alignItems:"center",gap:"10px",flex:1,minWidth:0}},
                                            e(Badge,{type:s.type}),
                                            e("div",{style:{minWidth:0}},
                                                e("div",{style:{fontWeight:600,color:"#1B4332",fontSize:"13px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},s.name),
                                                s.area_ha&&e("div",{style:{fontSize:"11px",color:"#9CA3AF"}},s.area_ha.toLocaleString()+" ha")
                                            )
                                        ),
                                        e("div",{style:{fontSize:"13px",fontWeight:600,color:"#40916C",whiteSpace:"nowrap",fontFamily:"'JetBrains Mono',monospace"}},
                                            s.distance.toFixed(1)+" km")
                                    );
                                })
                            ),
                            nearby.length>20&&e("div",{style:{textAlign:"center",fontSize:"12px",color:"#9CA3AF",padding:"8px"}},"…and "+(nearby.length-20)+" more within "+radius+"km")
                        )
                )
            );
        }

        function PostcodePage(p){
            var allSites=p.allSites,apiStatus=p.apiStatus;
            var _pc=useState(""), postcode=_pc[0], setPostcode=_pc[1];
            var _loc=useState(null), location=_loc[0], setLocation=_loc[1];
            var _ld=useState(false), loading=_ld[0], setLoading=_ld[1];
            var _err=useState(null), error=_err[0], setError=_err[1];
            var _rad=useState(5), radius=_rad[0], setRadius=_rad[1];
            var canSearch=apiStatus&&apiStatus.postcodes;

            function handleSearch(){
                var clean=postcode.replace(/\s/g,"").toUpperCase();
                if(clean.length<5){setError("Please enter a full Scottish postcode (e.g. EH1 1RE)");return;}
                if(SCOT_PREFIX.indexOf(clean.slice(0,2))<0&&!/^G\d/.test(clean)){setError("This doesn't look like a Scottish postcode.");return;}
                setError(null);setLoading(true);
                fetch("https://api.postcodes.io/postcodes/"+clean)
                    .then(function(r){if(!r.ok)throw new Error("Invalid");return r.json();})
                    .then(function(data){
                        if(data.result.country!=="Scotland")throw new Error("Not Scotland");
                        var loc={lat:data.result.latitude,lon:data.result.longitude,admin:data.result.admin_district,constituency:data.result.parliamentary_constituency,postcode:data.result.postcode};
                        setLocation(loc);setLoading(false);
                    })
                    .catch(function(err){
                        setLoading(false);
                        setError(err.message==="Not Scotland"?"This postcode isn't in Scotland.":err.message==="Invalid"?"Postcode not recognised.":"Could not look up postcode. Check your internet connection.");
                    });
            }

            return e("div",{style:{display:"flex",flexDirection:"column",gap:"20px"}},
                canSearch
                    ?e("div",{style:{backgroundColor:"#fff",borderRadius:"16px",border:"1px solid #E5E7EB",padding:"20px"}},
                        e("div",{style:{fontSize:"13px",fontWeight:600,color:"#374151",marginBottom:"10px"}},"Enter a Scottish postcode"),
                        e("div",{style:{display:"flex",gap:"10px",maxWidth:440}},
                            e("input",{type:"text",value:postcode,onChange:function(ev){setPostcode(ev.target.value.toUpperCase());},onKeyDown:function(ev){if(ev.key==="Enter")handleSearch();},placeholder:"e.g. EH1 1RE",
                                style:{flex:1,padding:"10px 14px",borderRadius:"8px",border:"1px solid #D1D5DB",fontSize:"15px",fontWeight:600,letterSpacing:"1px",fontFamily:"'JetBrains Mono',monospace"}}),
                            e("button",{onClick:handleSearch,disabled:loading,style:{padding:"10px 20px",borderRadius:"8px",border:"none",backgroundColor:"#1B4332",color:"#fff",fontWeight:700,fontSize:"14px",cursor:loading?"wait":"pointer"}},loading?"Searching…":"Explore")
                        ),
                        error&&e("div",{style:{marginTop:"10px",padding:"8px 12px",borderRadius:"6px",backgroundColor:"#FEF2F2",color:"#DC2626",fontSize:"13px"}},error),
                        location&&e("div",{className:"fade-in",style:{marginTop:"10px",fontSize:"13px",color:"#374151",display:"flex",alignItems:"center",gap:"6px"}},
                            "📍 ",e("span",{style:{fontWeight:600}},location.postcode)," · ",location.admin,
                            location.constituency?" · "+location.constituency:""
                        ),
                        !location&&e("div",{style:{marginTop:"12px",display:"flex",gap:"8px",flexWrap:"wrap"}},
                            ["EH1 1RE","G1 1XQ","AB10 1AF","IV2 3BL","DD1 4HN"].map(function(pc){
                                return e("button",{key:pc,onClick:function(){setPostcode(pc);},style:{padding:"5px 12px",borderRadius:"6px",border:"1px solid #D1FAE5",backgroundColor:"#F0FFF4",color:"#2D6A4F",fontWeight:600,fontSize:"12px",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}},pc);
                            })
                        )
                    )
                    :e("div",{style:{padding:"16px 20px",borderRadius:"12px",backgroundColor:"#FFFBEB",border:"1px solid #FDE68A",fontSize:"13px",color:"#92400E"}},"Postcodes.io is unreachable. Postcode search requires an internet connection."),
                location&&allSites&&e(NearbySitesPanel,{sites:allSites,lat:location.lat,lon:location.lon,radius:radius,onRadiusChange:setRadius})
            );
        }

        // ── Main app ──────────────────────────────────────────────────────────

        function App(){
            var _tab=useState("national"), activeTab=_tab[0], setActiveTab=_tab[1];
            var _api=useState(null), apiStatus=_api[0], setApiStatus=_api[1];
            var _nat=useState(null), natData=_nat[0], setNatData=_nat[1];
            var _reg=useState(window.__regionalData||null), regData=_reg[0], setRegData=_reg[1];
            var _re=useState(false), regError=_re[0], setRegError=_re[1];
            var _sites=useState(null), allSites=_sites[0], setAllSites=_sites[1];

            useEffect(function(){
                var s={github:false,postcodes:false};
                Promise.all([
                    fetch(GITHUB_DATA+"/national.json").then(function(r){if(r.ok)return r.json();throw 0;}).then(function(d){setNatData(d);s.github=true;}).catch(function(){}),
                    fetch(GITHUB_DATA+"/regional.json").then(function(r){if(r.ok)return r.json();throw 0;}).then(function(d){setRegData(d);s.github=true;}).catch(function(){setRegError(true);}),
                    fetch(GITHUB_DATA+"/sites.json").then(function(r){if(r.ok)return r.json();throw 0;}).then(function(d){setAllSites(d);s.github=true;}).catch(function(){}),
                    fetch("https://api.postcodes.io/postcodes/EH11RE").then(function(r){s.postcodes=r.ok;}).catch(function(){})
                ]).then(function(){setApiStatus(s);});
            },[]);

            return e("div",{style:{minHeight:"100vh",background:"linear-gradient(170deg,#F0FFF4 0%,#ECFDF5 30%,#F9FAFB 100%)"}},
                e("div",{style:{background:"linear-gradient(135deg,#1B4332 0%,#2D6A4F 60%,#40916C 100%)",padding:"28px 24px 0",color:"#fff"}},
                    e("div",{style:{maxWidth:960,margin:"0 auto"}},
                        e("h1",{style:{margin:"0 0 4px",fontSize:"24px",fontWeight:700,letterSpacing:"-0.5px"}},"Scotland Nature Dashboard"),
                        e("p",{style:{margin:"0 0 20px",fontSize:"13px",opacity:0.75}},"Protected sites & biodiversity data from NatureScot"),
                        e("div",{style:{display:"flex",gap:"4px"}},
                            TABS.map(function(tab){
                                return e("button",{key:tab.id,onClick:function(){setActiveTab(tab.id);},style:{
                                    padding:"10px 20px",border:"none",cursor:"pointer",fontSize:"14px",fontWeight:600,
                                    borderRadius:"10px 10px 0 0",
                                    backgroundColor:activeTab===tab.id?"#fff":"rgba(255,255,255,0.12)",
                                    color:activeTab===tab.id?"#1B4332":"rgba(255,255,255,0.85)"
                                }},tab.icon+" "+tab.label);
                            })
                        )
                    )
                ),
                e("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px"}},
                    e("div",{style:{display:"flex",flexDirection:"column",gap:"20px"}},
                        e(StatusBanner,{status:apiStatus}),
                        activeTab==="national"&&e(NationalPage,{data:natData}),
                        activeTab==="regional"&&e(RegionalPage,{data:regData,error:regError}),
                        activeTab==="postcode"&&e(PostcodePage,{allSites:allSites,apiStatus:apiStatus}),
                        e("div",{style:{padding:"14px 18px",borderRadius:"12px",backgroundColor:"#F9FAFB",border:"1px solid #E5E7EB",fontSize:"11px",color:"#9CA3AF",lineHeight:1.6}},
                            e("span",{style:{fontWeight:600,color:"#6B7280"}},"Data: "),
                            "Protected sites: ",e("a",{href:"https://gis-downloads.nature.scot/",style:{color:"#40916C"}},"NatureScot")," (OGL v3.0) · ",
                            "Postcodes: ",e("a",{href:"https://postcodes.io/",style:{color:"#40916C"}},"Postcodes.io")," (OS data © Crown copyright)"
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(e(App));
        } catch(err) {
            document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c00"><b>JavaScript Error:</b> ' + err.message + '</div>';
        }
    });
    </script>
</body>
</html>
